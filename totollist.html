<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민주의 TODO</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 100%; padding: 1.25rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.title { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.status-msg { font-size: 12px; color: #999; }
.cal-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #555; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 5px 10px; cursor: pointer; position: relative; }
.cal-btn:hover { border-color: #aaa; }
#date-picker { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }
.scroll-area { overflow-x: auto; padding-bottom: 8px; }
.columns { display: flex; gap: 12px; min-width: max-content; }
.col { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 12px; width: 240px; flex-shrink: 0; }
.col-today { border: 1.5px solid #378ADD; }
.col-past { background: #fafafa; }
.col-header { margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; }
.col-date { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.col-today .col-date { color: #185FA5; }
.col-past .col-date { color: #999; }
.col-sub { font-size: 11px; color: #bbb; margin-top: 2px; }
.col-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
.badge-today { background: #E6F1FB; color: #185FA5; }
.badge-past { background: #F1EFE8; color: #5F5E5A; }
.todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid #f0f0ec; }
.todo-item:last-child { border-bottom: none; }
.todo-cb { margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: #185FA5; width: 14px; height: 14px; }
.todo-right { flex: 1; min-width: 0; }
.todo-text { font-size: 13px; color: #1a1a1a; line-height: 1.4; word-break: break-word; }
.todo-text.done { text-decoration: line-through; color: #bbb; }
.todo-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
.tag-창업 { background: #FAEEDA; color: #633806; }
.tag-개발 { background: #E6F1FB; color: #0C447C; }
.tag-개인 { background: #FBEAF0; color: #72243E; }
.tag-기타 { background: #F1EFE8; color: #444441; }
.todo-memo { font-size: 11px; color: #bbb; margin-top: 2px; }
.move-btn { flex-shrink: 0; background: none; border: none; cursor: pointer; color: #ddd; font-size: 15px; padding: 1px 2px; transition: color 0.15s; }
.move-btn:hover { color: #185FA5; }
.add-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; padding: 6px 0; margin-top: 4px; width: 100%; transition: color 0.15s; }
.add-btn:hover { color: #555; }
.add-form { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.add-form input[type=text] { font-size: 13px; padding: 6px 8px; border: 0.5px solid #ccc; border-radius: 8px; background: #fafafa; color: #1a1a1a; width: 100%; outline: none; font-family: inherit; }
.add-form input[type=text]:focus { border-color: #378ADD; }
.add-form textarea { font-size: 12px; padding: 6px 8px; border: 0.5px solid #ccc; border-radius: 8px; background: #fafafa; color: #1a1a1a; width: 100%; resize: none; height: 48px; font-family: inherit; outline: none; }
.add-form textarea:focus { border-color: #378ADD; }
.tag-select { display: flex; gap: 4px; flex-wrap: wrap; }
.tag-opt { font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; border: 1.5px solid transparent; font-weight: 500; }
.tag-opt.selected { border-color: currentColor; }
.tag-opt-창업 { background: #FAEEDA; color: #633806; }
.tag-opt-개발 { background: #E6F1FB; color: #0C447C; }
.tag-opt-개인 { background: #FBEAF0; color: #72243E; }
.tag-opt-기타 { background: #F1EFE8; color: #444441; }
.form-btns { display: flex; gap: 6px; }
.form-btns button { font-size: 12px; padding: 4px 10px; border-radius: 8px; cursor: pointer; border: 0.5px solid #ddd; background: #f5f5f3; color: #1a1a1a; font-family: inherit; }
.form-btns .save-btn { background: #185FA5; color: #fff; border-color: #185FA5; }
.form-btns .save-btn:hover { background: #0C447C; }
.empty-msg { font-size: 12px; color: #ccc; padding: 10px 0; text-align: center; }
.error-banner { background: #FCEBEB; border: 0.5px solid #F7C1C1; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #A32D2D; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="app">
  <div id="err-wrap"></div>
  <div class="header">
    <span class="title"><i class="ti ti-checkbox"></i> 민주의 TODO</span>
    <div class="header-right">
      <button class="cal-btn">
        <i class="ti ti-calendar"></i> 날짜 선택
        <input type="date" id="date-picker">
      </button>
      <span class="status-msg" id="status">불러오는 중...</span>
    </div>
  </div>
  <div class="scroll-area">
    <div class="columns" id="columns"></div>
  </div>
</div>

<script>
const DS_ID = "015f382f-4e95-4b21-b1a5-3a735661122f";
const TAGS = ["창업","개발","개인","기타"];
let todos = [];
let extraDates = [];

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function offsetDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

function formatLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return { short: `${d.getMonth()+1}/${d.getDate()}`, day: days[d.getDay()] };
}

function getVisibleDates() {
  const base = [offsetDate(-1), offsetDate(0), offsetDate(1)];
  const extras = extraDates.filter(d => !base.includes(d));
  return [...base, ...extras].sort();
}

async function callNotion(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: `You manage a Notion Todo database (collection://${DS_ID}) using Notion MCP.
Respond with ONLY valid JSON — no markdown, no extra text.
List format: {"success":true,"data":[{"id":"<page_url>","title":"string","category":"string","done":bool,"date":"YYYY-MM-DD","memo":"string"}]}
Add/update format: {"success":true}
Error format: {"success":false,"error":"string"}`,
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }]
    })
  });
  const d = await res.json();
  const text = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  try {
    const m = text.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : { success: false, error: text };
  } catch(e) { return { success: false, error: text }; }
}

async function loadTodos() {
  setStatus("불러오는 중...");
  try {
    const r = await callNotion(`Fetch all pages from Notion database collection://${DS_ID}. Return each page as: id (page URL), title (할일), category (카테고리), done (완료 as boolean), date (날짜 as YYYY-MM-DD), memo (메모).`);
    if (r.success && Array.isArray(r.data)) {
      todos = r.data;
      setStatus(`${todos.length}개 항목`);
    } else {
      showError("로드 실패: " + (r.error || "알 수 없는 오류"));
      todos = [];
      setStatus("로드 실패");
    }
  } catch(e) {
    showError("네트워크 오류: " + e.message);
    setStatus("오류");
  }
  render();
}

async function addTodo(dateStr, title, category, memo) {
  setStatus("저장 중...");
  await callNotion(`Create page in collection://${DS_ID}: 할일="${title}", 카테고리="${category}", 날짜="${dateStr}", 메모="${memo}", 완료=false`);
  await loadTodos();
}

async function toggleTodo(id, currentDone) {
  const item = todos.find(t => t.id === id);
  if (item) item.done = !currentDone;
  render();
  await callNotion(`Update Notion page "${id}": set 완료 to ${!currentDone}`);
  setStatus(`${todos.length}개 항목`);
}

async function moveToNextDay(id, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  const next = d.toISOString().split('T')[0];
  const item = todos.find(t => t.id === id);
  if (item) item.date = next;
  render();
  await callNotion(`Update Notion page "${id}": set 날짜 to "${next}"`);
  setStatus(`${todos.length}개 항목`);
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }

function showError(msg) {
  const w = document.getElementById("err-wrap");
  w.innerHTML = `<div class="error-banner"><i class="ti ti-alert-circle"></i> ${msg}</div>`;
  setTimeout(() => { w.innerHTML = ""; }, 5000);
}

function render() {
  const container = document.getElementById("columns");
  container.innerHTML = "";
  const today = todayStr();

  getVisibleDates().forEach(dateStr => {
    const isPast = dateStr < today;
    const isToday = dateStr === today;
    const { short, day } = formatLabel(dateStr);
    const dayTodos = todos.filter(t => t.date === dateStr);
    const doneCnt = dayTodos.filter(t => t.done).length;

    const col = document.createElement("div");
    col.className = "col" + (isToday ? " col-today" : "") + (isPast ? " col-past" : "");
    col.dataset.date = dateStr;

    let badge = "";
    if (isToday) badge = `<span class="col-badge badge-today">오늘</span>`;
    else if (isPast && dayTodos.length > 0) badge = `<span class="col-badge badge-past">${doneCnt}/${dayTodos.length}</span>`;

    const header = document.createElement("div");
    header.className = "col-header";
    header.innerHTML = `
      <div>
        <div class="col-date">${short} (${day})</div>
        <div class="col-sub">${dayTodos.length}개</div>
      </div>
      ${badge}`;
    col.appendChild(header);

    if (isPast && dayTodos.length === 0) {
      const em = document.createElement("div");
      em.className = "empty-msg";
      em.textContent = "기록 없음";
      col.appendChild(em);
    }

    dayTodos.forEach(todo => {
      const item = document.createElement("div");
      item.className = "todo-item";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = "todo-cb";
      cb.checked = todo.done;
      if (!isPast) cb.addEventListener("change", () => toggleTodo(todo.id, todo.done));
      else cb.disabled = true;

      const right = document.createElement("div");
      right.className = "todo-right";
      right.innerHTML = `
        <div class="todo-text ${todo.done ? 'done' : ''}">${esc(todo.title)}</div>
        <div class="todo-meta">${todo.category ? `<span class="tag tag-${todo.category}">${todo.category}</span>` : ''}</div>
        ${todo.memo ? `<div class="todo-memo">${esc(todo.memo)}</div>` : ''}`;

      item.appendChild(cb);
      item.appendChild(right);

      if (!todo.done) {
        const mv = document.createElement("button");
        mv.className = "move-btn";
        mv.title = "다음날로 이동";
        mv.innerHTML = `<i class="ti ti-arrow-right"></i>`;
        mv.addEventListener("click", () => moveToNextDay(todo.id, dateStr));
        item.appendChild(mv);
      }

      col.appendChild(item);
    });

    if (!isPast) {
      const addBtn = document.createElement("button");
      addBtn.className = "add-btn";
      addBtn.innerHTML = `<i class="ti ti-plus"></i> 추가`;
      addBtn.onclick = () => showForm(col, addBtn, dateStr);
      col.appendChild(addBtn);
    }

    container.appendChild(col);
  });
}

function showForm(col, btn, dateStr) {
  btn.style.display = "none";
  let selectedTag = "기타";
  const form = document.createElement("div");
  form.className = "add-form";
  form.innerHTML = `
    <input type="text" placeholder="할일 입력" />
    <div class="tag-select">
      ${TAGS.map(t => `<span class="tag-opt tag-opt-${t}${t==='기타'?' selected':''}" data-tag="${t}">${t}</span>`).join("")}
    </div>
    <textarea placeholder="메모 (선택)"></textarea>
    <div class="form-btns">
      <button class="save-btn">저장</button>
      <button class="cancel-btn">취소</button>
    </div>`;

  form.querySelectorAll(".tag-opt").forEach(el => {
    el.addEventListener("click", () => {
      form.querySelectorAll(".tag-opt").forEach(e => e.classList.remove("selected"));
      el.classList.add("selected");
      selectedTag = el.dataset.tag;
    });
  });
  form.querySelector(".save-btn").onclick = async () => {
    const title = form.querySelector("input").value.trim();
    const memo = form.querySelector("textarea").value.trim();
    if (!title) return;
    form.remove();
    btn.style.display = "";
    await addTodo(dateStr, title, selectedTag, memo);
  };
  form.querySelector(".cancel-btn").onclick = () => {
    form.remove();
    btn.style.display = "";
  };
  col.appendChild(form);
  form.querySelector("input").focus();
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("date-picker").addEventListener("change", function() {
  const val = this.value;
  if (!val) return;
  const base = [offsetDate(-1), offsetDate(0), offsetDate(1)];
  if (!base.includes(val) && !extraDates.includes(val)) extraDates.push(val);
  render();
  setTimeout(() => {
    const el = document.querySelector(`[data-date="${val}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
  }, 100);
  this.value = "";
});

loadTodos();
</script>
</body>
</html>
